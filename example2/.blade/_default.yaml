#
# Global configuration for all services
#

- name: _default
  watch:
    fs:
      ignore:
        - node_modules
        - .*
        - "**/*_test.go"
  inheritEnv: true
  env:
    - name: GLOBAL_VAR_1
      value: GLOBAL_VAL_1
  output:
    stdout: os   # use "file:./logs/{service-name}.out" to write to a file instead
    stderr: os   # use "file:./logs/{service-name}.err" to write to a file instead
